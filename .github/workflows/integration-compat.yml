name: Integration Compatibility

# Scheduled canary for the optional external integrations (see Editor/TextureCompressor/Integrations).
# gameci.yml tests the pinned versions; this re-runs the same assembly against each integration's
# minimum-supported and latest release to catch upstream drift. Never blocks a merge — it files an issue.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: integration-compat
  cancel-in-progress: false

jobs:
  test:
    name: ${{ matrix.name }} ${{ matrix.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lilToon
            package: jp.lilxyzw.liltoon
            repo: "https://lilxyzw.github.io/vpm-repos/vpm.json"
            version: "1.8.0" # minimum supported: first release with RemoveUnusedTexture(Material, params string[])
          - name: lilToon
            package: jp.lilxyzw.liltoon
            repo: "https://lilxyzw.github.io/vpm-repos/vpm.json"
            version: "latest"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: ci_checkout
          lfs: true

      - name: Prepare project
        run: |
          mv ci_checkout/.github/unity/unity-2022.3.22f1/* . && \
          mkdir -p Packages/dev.limitex.avatar-compressor && \
          mv ci_checkout/* Packages/dev.limitex.avatar-compressor/ && \
          rm -rf ci_checkout

      - name: Setup vrc-get
        uses: anatawa12/sh-actions/setup-vrc-get@master

      # Install the matrix version explicitly (resolve-vpm-packages would just resolve the manifest
      # pin). install resolves the whole project, so VRChat SDK and NDMF come in too.
      - name: Resolve VPM packages with ${{ matrix.name }} ${{ matrix.version }}
        env:
          PACKAGE: ${{ matrix.package }}
          VERSION: ${{ matrix.version }}
          REPO: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          vrc-get repo add -- "https://vpm.limitex.dev/"
          vrc-get repo add -- "https://vpm.nadena.dev/vpm.json"
          vrc-get repo add -- "$REPO"
          if [ "$VERSION" = "latest" ]; then
            vrc-get install --yes --project "$GITHUB_WORKSPACE" "$PACKAGE"
          else
            vrc-get install --yes --project "$GITHUB_WORKSPACE" "$PACKAGE" "$VERSION"
          fi
          vrc-get resolve --project "$GITHUB_WORKSPACE"

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-integration-${{ matrix.name }}-${{ matrix.version }}-${{ hashFiles('Packages/**') }}
          restore-keys: Library-integration-${{ matrix.name }}-${{ matrix.version }}-

      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -assemblyNames dev.limitex.avatar-compressor.editor.tests
          checkName: Integration (${{ matrix.name }} ${{ matrix.version }})

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results (${{ matrix.name }} ${{ matrix.version }})
          path: ${{ steps.tests.outputs.artifactsPath }}

  report:
    name: Track compatibility failure
    needs: [test]
    # Only scheduled runs need an issue; a manual dispatch already shows red to whoever ran it.
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          title="Integration compatibility check is failing"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body=$(printf 'The scheduled **Integration Compatibility** workflow failed: one or more integration/version cells broke the integration test assembly.\n\nOpen the run to see which integration and version failed: %s\n\nThis is an upstream-drift signal, not a merge blocker.' "$run_url")
          gh label create integration-drift --color B60205 --description "External integration compatibility drift" --force
          existing=$(gh issue list --state open --label integration-drift --json number --jq '.[0].number? // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --label integration-drift --body "$body"
          fi
